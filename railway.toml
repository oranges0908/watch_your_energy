[build]
# Build from the backend subdirectory
dockerfilePath = "backend/Dockerfile"
dockerContextPath = "."
watchPatterns = ["backend/**", "frontend/**"]

[deploy]
# Railway injects $PORT automatically; uvicorn reads it via CMD in Dockerfile
#startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/projects"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
