server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter web — all routes fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for index.html so new builds are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
