services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false   # allows running without .env when vars are already in the shell
    environment:
      # These override any same-name values from .env
      - PORT=8000
      - DB_PATH=/data/watch_your_energy.db
    volumes:
      # Persist SQLite database across container restarts
      - db_data:/data
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/build/web:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
